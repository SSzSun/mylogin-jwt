<div class="min-h-screen bg-persimmon-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

      <!-- Header -->
      <div class="bg-linear-to-br from-persimmon-500 to-persimmon-700 px-8 pt-8 pb-7 text-center">
        <h1 class="text-white text-xl font-semibold tracking-wide">สมัครสมาชิก</h1>
        <p class="text-persimmon-100 text-xs mt-1">Create a new account</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-7">
        <form (ngSubmit)="onSubmit()">

          <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Username</label>
            <input type="text" [(ngModel)]="username" name="username" autocomplete="username"
              placeholder="อย่างน้อย 3 ตัวอักษร"
              class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-300
                     focus:outline-none focus:border-persimmon-400 focus:ring-2 focus:ring-persimmon-100 transition-all duration-150" />
          </div>

          <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Password</label>
            <input type="password" [(ngModel)]="password" name="password" autocomplete="new-password"
              placeholder="อย่างน้อย 4 ตัวอักษร"
              class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-300
                     focus:outline-none focus:border-persimmon-400 focus:ring-2 focus:ring-persimmon-100 transition-all duration-150" />
          </div>

          <div class="mb-5">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Confirm
              Password</label>
            <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" autocomplete="new-password"
              placeholder="ยืนยันรหัสผ่านอีกครั้ง"
              class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-300
                     focus:outline-none focus:border-persimmon-400 focus:ring-2 focus:ring-persimmon-100 transition-all duration-150" />
          </div>

          @if (error()) {
          <p class="text-red-500 text-xs text-center mb-4">{{ error() }}</p>
          }
          @if (success()) {
          <p class="text-green-600 text-xs text-center mb-4">{{ success() }}</p>
          }

          <button type="submit" [disabled]="loading()" class="w-full bg-persimmon-500 hover:bg-persimmon-600 active:bg-persimmon-700
                   text-white font-medium text-sm py-2.5 rounded-lg
                   transition-all duration-150 disabled:opacity-50 disabled:cursor-not-allowed">
            {{ loading() ? 'กำลังสมัคร...' : 'สมัครสมาชิก' }}
          </button>

        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
          มีบัญชีแล้ว?
          <a routerLink="/login" class="text-persimmon-500 font-semibold hover:text-persimmon-600 hover:underline ml-1">
            เข้าสู่ระบบ
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
