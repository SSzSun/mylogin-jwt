<div class="min-h-screen bg-persimmon-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
      <!-- Header -->
      <div class="bg-linear-to-br from-persimmon-500 to-persimmon-700 px-8 pt-8 pb-7 text-center">
        <h1 class="text-white text-xl font-semibold tracking-wide">เข้าสู่ระบบ</h1>
        <p class="text-persimmon-100 text-xs mt-1">Sign in to your account</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-7">
        <form (ngSubmit)="onSubmit()">
          <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5"
              >Username</label
            >
            <input
              type="text"
              [(ngModel)]="username"
              name="username"
              autocomplete="username"
              placeholder="กรอกชื่อผู้ใช้"
              class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:border-persimmon-400 focus:ring-2 focus:ring-persimmon-100 transition-all duration-150"
            />
          </div>

          <div class="mb-5">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5"
              >Password</label
            >
            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              autocomplete="current-password"
              placeholder="กรอกรหัสผ่าน"
              class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:border-persimmon-400 focus:ring-2 focus:ring-persimmon-100 transition-all duration-150"
            />
          </div>

          @if (error()) {
            <p class="text-red-500 text-xs text-center mb-4">{{ error() }}</p>
          }

          <button
            type="submit"
            [disabled]="loading()"
            class="w-full bg-persimmon-500 hover:bg-persimmon-600 active:bg-persimmon-700 text-white font-medium text-sm py-2.5 rounded-lg transition-all duration-150 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            {{ loading() ? 'กำลังเข้าสู่ระบบ...' : 'ลงชื่อเข้าใช้งาน' }}
          </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
          ยังไม่มีบัญชี?
          <a
            routerLink="/register"
            class="text-persimmon-500 font-semibold hover:text-persimmon-600 hover:underline ml-1"
          >
            สมัครสมาชิก
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
